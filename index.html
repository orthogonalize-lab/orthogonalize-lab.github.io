<style>
/* CRT flicker effect */
@keyframes textFlicker {
    0%   { opacity: 0.92; text-shadow: 0 0 8px #b300ff; }
    5%   { opacity: 0.75; text-shadow: 0 0 3px #b300ff; }
    10%  { opacity: 0.95; text-shadow: 0 0 12px #b300ff; }
    15%  { opacity: 0.60; text-shadow: 0 0 2px #b300ff; }
    20%  { opacity: 0.98; text-shadow: 0 0 10px #b300ff; }
    25%  { opacity: 0.70; text-shadow: 0 0 4px #b300ff; }
    30%  { opacity: 1.0;  text-shadow: 0 0 14px #b300ff; }
    100% { opacity: 0.92; text-shadow: 0 0 8px #b300ff; }
}
/* CRT scanline overlay */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.05) 0px,
        rgba(0,0,0,0.05) 1px,
        transparent 2px,
        transparent 3px
    );
    z-index: 5;
}


.title, .tagline {
    animation: textFlicker 0.12s infinite alternate;
}

html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #00ff66;
    font-family: "DejaVu Sans Mono", "Liberation Mono", monospace;
    height: 100%;
    width: 100%;
}

/* Canvas stays behind everything */
#canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 1;
}

/* Text sits ABOVE the canvas */
.title {
    position: absolute;
    top: 6%;
    width: 100%;
    text-align: center;
    color: #b300ff;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 10px #b300ff;
    pointer-events: none;
    z-index: 10;
}

.tagline {
    position: absolute;
    top: 13%;
    width: 100%;
    text-align: center;
    color: #b300ff;
    font-size: 22px;
    text-shadow: 0 0 8px #b300ff;
    pointer-events: none;
    z-index: 10;
}
</style>
</head>

// Normalize prices
const minP = Math.min(...prices);
const maxP = Math.max(...prices);
const normP = prices.map(p => (p - minP) / (maxP - minP));

// EWMA volatility
const h = new Array(prices.length).fill(0);
let hPrev = 0;
for (let i = 1; i < prices.length; i++) {
    const r = Math.abs(prices[i] - prices[i - 1]);
    h[i] = 0.1 * r + 0.8 * hPrev;
    hPrev = h[i];
}
const maxH = Math.max(...h);
const normH = h.map(v => v / maxH);

// Canvas setup
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Map index to screen coords
function getPoint(i) {
    const x = (i / (normP.length - 1)) * W;
    const y = H * (0.25 + 0.55 * (1 - normP[i]));
    return { x, y };
}

// Particles
const particles = [];
const MAXP = 2000;

function spawn(i, count) {
    const base = getPoint(i);
    const vol = normH[i];
    const R = Math.sqrt(vol) * 120;

    for (let k = 0; k < count; k++) {
        if (particles.length >= MAXP) break;

        const a = Math.random() * Math.PI * 2;
        const s = R * (1.4 + Math.random() * 1.2);

        particles.push({
            x: base.x + (Math.random() - 0.5) * 4,
            y: base.y + (Math.random() - 0.5) * 4,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            life: 1,
            vol: vol
        });
    }
}

// Draw glitchy line
function drawLine() {
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(179,0,255,0.9)";
    ctx.beginPath();

    for (let i = 0; i < normP.length; i++) {
        const p = getPoint(i);
        const gy = p.y + (Math.random() - 0.5) * 4;
        if (i === 0) ctx.moveTo(p.x, gy);
        else ctx.lineTo(p.x, gy);
    }
    ctx.stroke();

    // Glow layer
    ctx.lineWidth = 6;
    ctx.strokeStyle = "rgba(179,0,255,0.25)";
    ctx.beginPath();
    for (let i = 0; i < normP.length; i++) {
        const p = getPoint(i);
        const gy = p.y + (Math.random() - 0.5) * 6;
        if (i === 0) ctx.moveTo(p.x, gy);
        else ctx.lineTo(p.x, gy);
    }
    ctx.stroke();
}

let t = 0;

function animate() {
    // Faint trail for storm effect
    ctx.fillStyle = "rgba(0,255,102,0.18)";
    ctx.fillRect(0, 0, W, H);

    drawLine();

    // Time index
    const idx = Math.floor(t) % (normP.length - 1);
    const vol = normH[idx];

    // Spawn particles
    const baseCount = 6;
    const extra = Math.floor(vol * 50);
    spawn(idx, baseCount + extra);

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        // Fast motion
        p.x += p.vx * 0.05;
        p.y += p.vy * 0.05;

        // Damping
        p.vx *= 0.90;
        p.vy *= 0.90;

        // Fade
        p.life -= 0.015 + p.vol * 0.02;
        if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
        }

        const alpha = Math.max(0, p.life) * (0.4 + p.vol * 0.6);
        const size = 2 + 3 * Math.sqrt(p.vol);

        ctx.fillStyle = `rgba(255,140,0,${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();
    }

    t += 0.2;
    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
