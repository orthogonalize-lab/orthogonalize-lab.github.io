<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orthogonalize Lab</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #00ff66; /* NEON GREEN */
        font-family: "DejaVu Sans Mono", "Liberation Mono", monospace;
        height: 100%;
        width: 100%;
    }

    #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
    }

    .title {
        position: absolute;
        top: 50%;
        width: 100%;
        text-align: center;
        transform: translateY(-50%);
        color: #b300ff; /* ELECTRIC PURPLE */
        font-size: 48px;
        font-weight: bold;
        text-shadow: 0 0 10px #b300ff;
        pointer-events: none;
    }

    .tagline {
        position: absolute;
        top: calc(50% + 60px);
        width: 100%;
        text-align: center;
        color: #b300ff;
        font-size: 22px;
        text-shadow: 0 0 8px #b300ff;
        pointer-events: none;
    }
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<div class="title">Orthogonalize Lab</div>
<div class="tagline">If you want to be different, orthogonalize.</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

ctx.fillStyle = "red";
ctx.fillRect(50, 50, 200, 200);
</script>
</body>
</html>
